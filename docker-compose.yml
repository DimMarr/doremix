services:
  frontend:
    build:
      context: .
      dockerfile: build/frontend/Dockerfile
    container_name: web
    restart: unless-stopped
    ports:
      - "8080:5173" 
    environment:
      - NODE_ENV=development
    volumes:
      - ./src/front:/app
      - /app/node_modules
    command: ["/bin/sh", "-c", "npm run dev -- --host"]
    networks:
      - frontend-network

  db:
    image: postgres:17.1
    container_name: database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./build/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./build/database/insert.sql:/docker-entrypoint-initdb.d/02-insert.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

  backend:
    build:
      context: .
      dockerfile: build/backend/Dockerfile
    container_name: backend_python
    restart: unless-stopped
    volumes:
      - ./src/back:/app
      - /app/__pycache__
    ports:
      - 8000:8000
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    volumes:
      - ./src/back:/app
    networks:
      - frontend-network
      - backend-network

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
    internal: true

volumes:
  postgres_data: