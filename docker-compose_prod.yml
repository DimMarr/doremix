services:
  frontend:
    image: ${CI_REGISTRY_IMAGE}/frontend:${IMAGE_TAG:-latest}
    container_name: web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - NODE_ENV=production
    volumes:
      - /home/pwa/certs:/certs:ro
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    networks:
      - frontend-network
    depends_on:
      backend:
        condition: service_healthy

  db:
    image: postgres:17.1

    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./build/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./build/database/insert.sql:/docker-entrypoint-initdb.d/02-insert.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - backend-network

  backend:
    image: ${CI_REGISTRY_IMAGE}/backend:${IMAGE_TAG:-latest}
    container_name: backend_python
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      TOKEN_SECRET_KEY: ${TOKEN_SECRET_KEY}
      PEPPER_KEY: ${PEPPER_KEY}
    volumes:
      - ./uploads/covers:/app/uploads/covers
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    networks:
      - frontend-network
      - backend-network
    depends_on:
      db:
        condition: service_healthy

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
    internal: true

volumes:
  postgres_data:
