services:
  frontend:
    build:
      context: ./src/front
      dockerfile: ../../build/frontend/Dockerfile-prod
    container_name: web
    restart: unless-stopped
    ports:
      - "80:80"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80" ]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - frontend-network
    depends_on:
      backend:
        condition: service_healthy

  db:
    image: postgres:17.1
    container_name: database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./build/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./build/database/insert.sql:/docker-entrypoint-initdb.d/02-insert.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - backend-network

  backend:
    build:
      context: .
      dockerfile: build/backend/Dockerfile
    container_name: backend_python
    restart: unless-stopped
    ports:
      - 8000:8000
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      BACKEND_URL: ${BACKEND_URL}
    volumes:
      - ./src/back:/app
      - ./uploads:/app/uploads
      - /app/__pycache__
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/docs" ]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - frontend-network
      - backend-network
    depends_on:
      db:
        condition: service_healthy

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
    internal: true

volumes:
  postgres_data:
