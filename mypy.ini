ignore_missing_imports = True

[mypy-requests]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True

[mypy-dotenv]
ignore_missing_imports = True

[mypy-python-dotenv]
ignore_missing_imports = True

[mypy-fastapi]
ignore_missing_imports = True

[mypy-fastapi.*]
