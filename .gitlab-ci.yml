stages:
  - test
  - build
  - deploy

variables:
  PRE_COMMIT_HOME: ${CI_PROJECT_DIR}/.cache/pre-commit
  BACKEND_IMAGE: ${CI_REGISTRY_IMAGE}/backend
  FRONTEND_IMAGE: ${CI_REGISTRY_IMAGE}/frontend
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"

pre_commit_check:
  stage: test
  image: ${CI_REGISTRY_IMAGE}/pre-commit
  cache:
    key: pre-commit-cache
    paths:
      - .cache/pre-commit
  script:
    - git config --global --add safe.directory $CI_PROJECT_DIR
    - echo "🔍 Exécution des hooks pre-commit sur l'ensemble des fichiers..."
    - |
      pre-commit run --all-files || {
        echo ""
        echo "🛑 🛑 🛑 ÉCHEC DE LA VALIDATION DU CODE 🛑 🛑 🛑"
        echo "----------------------------------------------------------------"
        echo "Le pipeline a été arrêté car le code ne respecte pas les standards."
        echo "Nous ne déployons pas de code qui ne passe pas les tests."
        echo ""
        echo "👉 SOLUTION : Installez pre-commit sur votre machine :"
        echo "   1. uv tool install pre-commit (ou pip install pre-commit)"
        echo "   2. pre-commit install"
        echo "   3. pre-commit run --all-files"
        echo "   4. Corrigez les erreurs, commitez et pushez à nouveau."
        echo "----------------------------------------------------------------"
        exit 1
      }

test:
  stage: test
  image: python:3.13-slim
  cache:
    key: python-deps
    paths:
      - .cache/pip
      - .cache/uv
  script:
    - pip install uv
    - uv sync
    - uv run pytest --cov -v

.build_template: &build_template
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker buildx create --use --driver docker-container

build_backend_beta:
  <<: *build_template
  only:
    - beta
  script:
    - echo "🔨 Build backend beta..."
    - docker buildx build
      --cache-from type=registry,ref=$BACKEND_IMAGE:cache-beta
      --cache-to type=registry,ref=$BACKEND_IMAGE:cache-beta,mode=max
      -f build/backend/Dockerfile
      -t $BACKEND_IMAGE:beta
      --push
      .

build_frontend_beta:
  <<: *build_template
  only:
    - beta
  script:
    - echo "🔨 Build frontend beta..."
    - docker buildx build
      --cache-from type=registry,ref=$FRONTEND_IMAGE:cache-beta
      --cache-to type=registry,ref=$FRONTEND_IMAGE:cache-beta,mode=max
      -f build/frontend/Dockerfile-beta
      -t $FRONTEND_IMAGE:beta
      --push
      .

build_backend_prod:
  <<: *build_template
  rules:
    - if: "$CI_COMMIT_TAG"
      when: on_success
  script:
    - echo "🔨 Build backend prod..."
    - docker buildx build
      --cache-from type=registry,ref=$BACKEND_IMAGE:cache-prod
      --cache-to type=registry,ref=$BACKEND_IMAGE:cache-prod,mode=max
      -f build/backend/Dockerfile
      -t $BACKEND_IMAGE:latest
      -t $BACKEND_IMAGE:$CI_COMMIT_TAG
      --push
      .

build_frontend_prod:
  <<: *build_template
  rules:
    - if: "$CI_COMMIT_TAG"
      when: on_success
  script:
    - echo "🔨 Build frontend prod..."
    - docker buildx build
      --cache-from type=registry,ref=$FRONTEND_IMAGE:cache-prod
      --cache-to type=registry,ref=$FRONTEND_IMAGE:cache-prod,mode=max
      -f build/frontend/Dockerfile-prod
      -t $FRONTEND_IMAGE:latest
      -t $FRONTEND_IMAGE:$CI_COMMIT_TAG
      --push
      .

deploy_beta:
  stage: deploy
  image: alpine:3.23.2
  only:
    - beta
  variables:
    DEPLOY_PATH: "/home/$SSH_USER_BETA/doremix"
    IMAGE_TAG: "beta"
  before_script:
    - apk add --no-cache openssh-client rsync bash
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY_BETA" | base64 -d | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H "$SSH_HOST_BETA" >> ~/.ssh/known_hosts
  script:
    - echo "📂 Début du déploiement..."
    - ssh $SSH_USER_BETA@$SSH_HOST_BETA "mkdir -p $DEPLOY_PATH"
    - rsync -avz
      --exclude='.git/'
      --exclude='.gitlab-ci.yml'
      --exclude='.env'
      --exclude='__pycache__/'
      --exclude='node_modules/'
      --exclude='uploads/covers/'
      --exclude='src/'
      .
      $SSH_USER_BETA@$SSH_HOST_BETA:$DEPLOY_PATH

    - echo "🚀 Déploiement des images beta..."
    - ssh $SSH_USER_BETA@$SSH_HOST_BETA "
      cd $DEPLOY_PATH &&
      docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
      CI_REGISTRY_IMAGE=$CI_REGISTRY_IMAGE IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose_beta.yml pull &&
      CI_REGISTRY_IMAGE=$CI_REGISTRY_IMAGE IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose_beta.yml up -d --remove-orphans
      "

deploy_prod:
  stage: deploy
  image: alpine:3.23.2
  rules:
    - if: "$CI_COMMIT_TAG"
      when: on_success
  variables:
    DEPLOY_PATH: "/home/$SSH_USER_PROD/doremix"
    IMAGE_TAG: "$CI_COMMIT_TAG"
  before_script:
    - apk add --no-cache openssh-client rsync bash
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY_PROD" | base64 -d | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H "$SSH_HOST_PROD" >> ~/.ssh/known_hosts
  script:
    - echo "📂 Début du déploiement..."
    - ssh $SSH_USER_PROD@$SSH_HOST_PROD "mkdir -p $DEPLOY_PATH"
    - rsync -avz
      --exclude='.git/'
      --exclude='.gitlab-ci.yml'
      --exclude='.env'
      --exclude='__pycache__/'
      --exclude='node_modules/'
      --exclude='uploads/covers/'
      --exclude='src/'
      .
      $SSH_USER_PROD@$SSH_HOST_PROD:$DEPLOY_PATH

    - echo "🚀 Déploiement des images prod..."
    - ssh $SSH_USER_PROD@$SSH_HOST_PROD "
      cd $DEPLOY_PATH &&
      docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
      sed -i 's/server_name localhost;/server_name $HOST_FQDN;/' build/frontend/nginx.conf &&
      CI_REGISTRY_IMAGE=$CI_REGISTRY_IMAGE IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose_prod.yml pull &&
      CI_REGISTRY_IMAGE=$CI_REGISTRY_IMAGE IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose_prod.yml up -d --remove-orphans
      "
