stages:
  - test
  - build
  - deploy

variables:
  PRE_COMMIT_HOME: ${CI_PROJECT_DIR}/.cache/pre-commit
  BACKEND_IMAGE: ${CI_REGISTRY_IMAGE}/backend
  FRONTEND_IMAGE: ${CI_REGISTRY_IMAGE}/frontend
  CLI_PACKAGE_NAME: doremix-cli
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"

  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2

pre_commit_check:
  stage: test
  image: ${CI_REGISTRY_IMAGE}/pre-commit
  cache:
    key: pre-commit-cache
    paths:
      - .cache/pre-commit
  script:
    - git config --global --add safe.directory $CI_PROJECT_DIR
    - echo "🔍 Exécution des hooks pre-commit sur l'ensemble des fichiers..."
    - |
      pre-commit run --all-files || {
        echo ""
        echo "🛑 🛑 🛑 ÉCHEC DE LA VALIDATION DU CODE 🛑 🛑 🛑"
        echo "----------------------------------------------------------------"
        echo "Le pipeline a été arrêté car le code ne respecte pas les standards."
        echo "Nous ne déployons pas de code qui ne passe pas les tests."
        echo ""
        echo "👉 SOLUTION : Installez pre-commit sur votre machine :"
        echo "   1. uv tool install pre-commit (ou pip install pre-commit)"
        echo "   2. pre-commit install"
        echo "   3. pre-commit run --all-files"
        echo "   4. Corrigez les erreurs, commitez et pushez à nouveau."
        echo "----------------------------------------------------------------"
        exit 1
      }

test:
  stage: test
  image: python:3.13-slim
  cache:
    key: python-deps
    paths:
      - .cache/pip
      - .cache/uv
  script:
    - pip install uv
    - uv sync
    - uv run pytest --cov -v

.build_template: &build_template
  stage: build
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
      command: ["--tls=false"]
  before_script:
    # On attend que le daemon soit prêt
    - |
      for i in $(seq 1 30); do
        docker info > /dev/null 2>&1 && break
        echo "En attente du daemon Docker..."
        sleep 1
      done
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

build_backend_beta:
  <<: *build_template
  only:
    - beta
  script:
    - docker build --cache-from $BACKEND_IMAGE:beta -f build/backend/Dockerfile -t $BACKEND_IMAGE:beta .
    - docker push $BACKEND_IMAGE:beta

build_frontend_beta:
  <<: *build_template
  only:
    - beta
  script:
    - docker build --cache-from $FRONTEND_IMAGE:beta -f build/frontend/Dockerfile-beta -t $FRONTEND_IMAGE:beta .
    - docker push $FRONTEND_IMAGE:beta

build_backend_prod:
  <<: *build_template
  rules:
    - if: "$CI_COMMIT_TAG"
      when: on_success
  script:
    - echo "🔨 Build backend prod..."
    - docker build
      --cache-from $BACKEND_IMAGE:latest
      -f build/backend/Dockerfile
      -t $BACKEND_IMAGE:latest
      -t $BACKEND_IMAGE:$CI_COMMIT_TAG
      .
    - docker push $BACKEND_IMAGE:latest
    - docker push $BACKEND_IMAGE:$CI_COMMIT_TAG

build_frontend_prod:
  <<: *build_template
  rules:
    - if: "$CI_COMMIT_TAG"
      when: on_success
  script:
    - echo "🔨 Build frontend prod..."
    - docker build
      --cache-from $FRONTEND_IMAGE:latest
      -f build/frontend/Dockerfile-prod
      -t $FRONTEND_IMAGE:latest
      -t $FRONTEND_IMAGE:$CI_COMMIT_TAG
      .
    - docker push $FRONTEND_IMAGE:latest
    - docker push $FRONTEND_IMAGE:$CI_COMMIT_TAG

package_cli:
  stage: build
  image: python:3.12-slim
  rules:
    - if: "$CI_COMMIT_TAG"
      when: on_success
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends curl ca-certificates binutils
    - rm -rf /var/lib/apt/lists/*
    - pip install --no-cache-dir uv
    - |
      curl -sSfL https://github.com/goreleaser/nfpm/releases/download/v2.41.3/nfpm_2.41.3_Linux_x86_64.tar.gz \
      | tar -xz -C /usr/local/bin nfpm
    - chmod +x /usr/local/bin/nfpm
  script:
    - cd src/cli
    - uv sync
    - uv run --with pyinstaller pyinstaller --clean --noconfirm --onefile --name doremix src/main.py
    - cd "$CI_PROJECT_DIR"
    - |
      case "$(uname -m)" in
        x86_64) export PKG_ARCH="amd64" ;;
        aarch64|arm64) export PKG_ARCH="arm64" ;;
        *) echo "Unsupported architecture: $(uname -m)" && exit 1 ;;
      esac
    - export PKG_VERSION="${CI_COMMIT_TAG#v}"
    - mkdir -p dist/packages
    - nfpm package --config build/cli/nfpm.yaml --packager deb --target "dist/packages/${CLI_PACKAGE_NAME}_${PKG_VERSION}_${PKG_ARCH}.deb"
    - nfpm package --config build/cli/nfpm.yaml --packager rpm --target "dist/packages/${CLI_PACKAGE_NAME}-${PKG_VERSION}-1.${PKG_ARCH}.rpm"
    - ls -lh dist/packages
  artifacts:
    name: "cli-packages-${CI_COMMIT_TAG}"
    paths:
      - dist/packages/*.deb
      - dist/packages/*.rpm
    expire_in: 14 days

publish_cli_packages:
  stage: build
  image: curlimages/curl:8.16.0
  needs:
    - job: package_cli
      artifacts: true
  rules:
    - if: "$CI_COMMIT_TAG"
      when: on_success
  script:
    - export PACKAGE_VERSION="${CI_COMMIT_TAG#v}"
    - |
      for pkg in dist/packages/*.deb dist/packages/*.rpm; do
        if [ ! -f "$pkg" ]; then
          continue
        fi

        filename="$(basename "$pkg")"
        upload_url="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${CLI_PACKAGE_NAME}/${PACKAGE_VERSION}/${filename}"

        echo "Uploading ${filename}"
        curl --fail-with-body --location \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "$pkg" \
          "$upload_url"
      done

package_cli_beta:
  stage: build
  image: python:3.12-slim
  rules:
    - if: '$CI_COMMIT_BRANCH == "beta"'
      when: on_success
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends curl ca-certificates binutils
    - rm -rf /var/lib/apt/lists/*
    - pip install --no-cache-dir uv
    - |
      curl -sSfL https://github.com/goreleaser/nfpm/releases/download/v2.41.3/nfpm_2.41.3_Linux_x86_64.tar.gz \
      | tar -xz -C /usr/local/bin nfpm
    - chmod +x /usr/local/bin/nfpm
  script:
    - cd src/cli
    - uv sync
    - uv run --with pyinstaller pyinstaller --clean --noconfirm --onefile --name doremix src/main.py
    - cd "$CI_PROJECT_DIR"
    - |
      case "$(uname -m)" in
        x86_64) export PKG_ARCH="amd64" ;;
        aarch64|arm64) export PKG_ARCH="arm64" ;;
        *) echo "Unsupported architecture: $(uname -m)" && exit 1 ;;
      esac
    - export PKG_VERSION="0.0.0-beta.${CI_PIPELINE_IID}"
    - mkdir -p dist/packages
    - nfpm package --config build/cli/nfpm.yaml --packager deb --target "dist/packages/${CLI_PACKAGE_NAME}_beta_${CI_COMMIT_SHORT_SHA}_${PKG_ARCH}.deb"
    - nfpm package --config build/cli/nfpm.yaml --packager rpm --target "dist/packages/${CLI_PACKAGE_NAME}_beta_${CI_COMMIT_SHORT_SHA}.${PKG_ARCH}.rpm"
    - ls -lh dist/packages
  artifacts:
    name: "cli-packages-beta-${CI_COMMIT_SHORT_SHA}"
    paths:
      - dist/packages/*.deb
      - dist/packages/*.rpm
    expire_in: 14 days

publish_cli_packages_beta_latest:
  stage: build
  image: curlimages/curl:8.16.0
  needs:
    - job: package_cli_beta
      artifacts: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "beta"'
      when: on_success
  script:
    - export PACKAGE_VERSION="latest"
    - |
      for pkg in dist/packages/*.deb dist/packages/*.rpm; do
        if [ ! -f "$pkg" ]; then
          continue
        fi

        filename="$(basename "$pkg")"
        upload_url="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${CLI_PACKAGE_NAME}/${PACKAGE_VERSION}/${filename}"

        echo "Uploading ${filename} to ${PACKAGE_VERSION}"
        curl --fail-with-body --location \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "$pkg" \
          "$upload_url"
      done

deploy_beta:
  stage: deploy
  image: alpine:3.23.2
  needs:
    - build_backend_beta
    - build_frontend_beta
  only:
    - beta
  variables:
    DEPLOY_PATH: "/home/$SSH_USER_BETA/doremix"
    IMAGE_TAG: "beta"
  before_script:
    - apk add --no-cache openssh-client rsync bash
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY_BETA" | base64 -d | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H "$SSH_HOST_BETA" >> ~/.ssh/known_hosts
  script:
    - echo "📂 Début du déploiement..."
    - ssh $SSH_USER_BETA@$SSH_HOST_BETA "mkdir -p $DEPLOY_PATH"
    - rsync -avz
      --exclude='.git/'
      --exclude='.gitlab-ci.yml'
      --exclude='.env'
      --exclude='__pycache__/'
      --exclude='node_modules/'
      --exclude='uploads/covers/'
      --exclude='src/'
      .
      $SSH_USER_BETA@$SSH_HOST_BETA:$DEPLOY_PATH

    - echo "🚀 Déploiement des images beta..."
    - ssh $SSH_USER_BETA@$SSH_HOST_BETA "
      cd $DEPLOY_PATH &&
      docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
      CI_REGISTRY_IMAGE=$CI_REGISTRY_IMAGE IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose_beta.yml pull &&
      CI_REGISTRY_IMAGE=$CI_REGISTRY_IMAGE IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose_beta.yml up -d --remove-orphans
      "

deploy_prod:
  stage: deploy
  image: alpine:3.23.2
  needs:
    - build_backend_prod
    - build_frontend_prod
  rules:
    - if: "$CI_COMMIT_TAG"
      when: on_success
  variables:
    DEPLOY_PATH: "/home/$SSH_USER_PROD/doremix"
    IMAGE_TAG: "$CI_COMMIT_TAG"
  before_script:
    - apk add --no-cache openssh-client rsync bash
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY_PROD" | base64 -d | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H "$SSH_HOST_PROD" >> ~/.ssh/known_hosts
  script:
    - echo "📂 Début du déploiement..."
    - ssh $SSH_USER_PROD@$SSH_HOST_PROD "mkdir -p $DEPLOY_PATH"
    - rsync -avz
      --exclude='.git/'
      --exclude='.gitlab-ci.yml'
      --exclude='.env'
      --exclude='__pycache__/'
      --exclude='node_modules/'
      --exclude='uploads/covers/'
      --exclude='src/'
      .
      $SSH_USER_PROD@$SSH_HOST_PROD:$DEPLOY_PATH

    - echo "🚀 Déploiement des images prod..."
    - ssh $SSH_USER_PROD@$SSH_HOST_PROD "
      cd $DEPLOY_PATH &&
      docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
      sed -i 's/server_name localhost;/server_name $HOST_FQDN;/' build/frontend/nginx.conf &&
      CI_REGISTRY_IMAGE=$CI_REGISTRY_IMAGE IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose_prod.yml pull &&
      CI_REGISTRY_IMAGE=$CI_REGISTRY_IMAGE IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose_prod.yml up -d --remove-orphans
      "
