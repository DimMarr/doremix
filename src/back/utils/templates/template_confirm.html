<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Active ton compte Doremix 🎵</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #0a0a0a;
        color: #d29595;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 600px;
        margin: 40px auto;
        padding: 30px;
        background-color: #171717;
        border-radius: 12px;
        border: 1px solid #27272a;
      }
      h1 {
        color: #2b7fff;
        text-align: center;
        font-size: 24px;
      }
      p {
        font-size: 16px;
        line-height: 1.5;
        color: #fafafa;
      }
      .username {
        color: #2b7fff;
        font-weight: bold;
      }
      .code-box {
        display: block;
        margin: 30px auto;
        text-align: center;
        font-size: 42px;
        font-weight: 800;
        letter-spacing: 12px;
        color: #ffffff;
        background-color: #27272a;
        border: 2px solid #2b7fff;
        border-radius: 12px;
        padding: 20px 30px;
        width: fit-content;
      }
      .expiry {
        text-align: center;
        color: #71717a;
        font-size: 14px;
        margin-top: 8px;
      }
      .footer {
        margin-top: 30px;
        font-size: 12px;
        color: #71717a;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Bienvenue sur Doremix</h1>
      <p>Bonjour <span class="username">{{ username }}</span> !</p>
      <p>
        Ton compte sur <strong>Doremix</strong> a bien été créé. Voici ton code
        de vérification :
      </p>
      <span class="code-box">{{ code }}</span>
      <p class="expiry">Ce code expire dans 15 minutes.</p>
      <div class="footer">
        Ce mail est envoyé automatiquement, merci de ne pas répondre.
      </div>
    </div>
  </body>
</html>
