<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Active ton compte Doremix 🎵</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #0a0a0a;
        color: #d29595;
        margin: 0;
        padding: 0;
      }

      .container {
        max-width: 600px;
        margin: 40px auto;
        padding: 30px;
        background-color: #171717;
        border-radius: 12px;
        border: 1px solid #27272a;
      }

      h1 {
        color: #2b7fff;
        text-align: center;
        font-size: 24px;
      }

      p {
        font-size: 16px;
        line-height: 1.5;
        color: #fafafa;
      }

      .username {
        color: #2b7fff;
        font-weight: bold;
      }

      .btn {
        display: inline-block;
        padding: 12px 25px;
        margin-top: 20px;
        border-radius: 20px;
        background-color: #2b7fff;
        color: #ffffff;
        text-decoration: none;
        font-weight: 600;
        text-align: center;
        transition: all 0.2s ease-in-out;
      }

      .btn:hover {
        background-color: #1a5fd1;
        transform: scale(1.05);
      }

      .footer {
        margin-top: 30px;
        font-size: 12px;
        color: #71717a;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Bienvenue sur Doremix <img src="logo.png" /></h1>
      <p>Bonjour <span class="username">{{ username }}</span> !</p>
      <p>Ton compte sur <strong>Doremix</strong> a bien été créé.</p>

      <p>Clique sur le bouton ci-dessous pour activer ton compte :</p>
      <p style="text-align: center">
        <a style="color: #fafafa" href="{{ activation_link }}" class="btn"
          >Activer mon compte</a
        >
      </p>

      <div class="footer">
        Ce mail est envoyé automatiquement, merci de ne pas répondre.
      </div>
    </div>
  </body>
</html>
